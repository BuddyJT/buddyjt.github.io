<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080" role="img" aria-labelledby="title desc">
  <title id="title">SecraCloud Cyber Background</title>
  <desc id="desc">Dark private-cloud background with cyan grid lines, glowing data points, and layered translucent panels.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1920" y2="1080" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#01060A"/>
      <stop offset=".48" stop-color="#031018"/>
      <stop offset="1" stop-color="#051B28"/>
    </linearGradient>
    <radialGradient id="cyanGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1360 700) rotate(12) scale(590 260)">
      <stop offset="0" stop-color="#22D6FF" stop-opacity=".62"/>
      <stop offset=".4" stop-color="#0EA5B7" stop-opacity=".22"/>
      <stop offset="1" stop-color="#0EA5B7" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="violetGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1685 610) rotate(80) scale(340 110)">
      <stop offset="0" stop-color="#7B6DFF" stop-opacity=".58"/>
      <stop offset=".56" stop-color="#7B6DFF" stop-opacity=".16"/>
      <stop offset="1" stop-color="#7B6DFF" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#22D6FF" stop-opacity="0"/>
      <stop offset=".5" stop-color="#22D6FF" stop-opacity=".82"/>
      <stop offset="1" stop-color="#9BFFF3" stop-opacity="0"/>
    </linearGradient>
    <filter id="softGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="1920" height="1080" fill="url(#bg)"/>
  <rect width="1920" height="1080" fill="url(#cyanGlow)"/>
  <rect width="1920" height="1080" fill="url(#violetGlow)"/>
  <path d="M0 810 1920 660M0 890 1920 775M120 1040 1680 425M300 1080 1850 505M620 1080 1920 705" stroke="#22D6FF" stroke-opacity=".18" stroke-width="2"/>
  <path d="M0 948 1920 938M0 1008 1920 1020M160 1080 1600 622M520 1080 1820 700" stroke="#9BFFF3" stroke-opacity=".09" stroke-width="1"/>
  <g fill="none" stroke="#22D6FF" stroke-width="2" stroke-opacity=".28">
    <path d="M1110 276h250v430h-250z"/>
